name: Build UnityForge Mobile APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create UnityForge Mobile
        run: |
          mkdir -p app/src/main/java/com/unityforge/mobile
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          cat > settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "UnityForgeMobile"
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins { id 'com.android.application' version '8.7.3' apply false }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.unityforge.mobile'
              compileSdk 35
              defaultConfig {
                  applicationId 'com.unityforge.mobile'
                  minSdk 23
                  targetSdk 35
                  versionCode 2
                  versionName '1.1'
              }
          }
          EOF

          cat > app/src/main/res/values/colors.xml <<'EOF'
          <resources>
              <color name="icon_bg">#071226</color>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowLightNavigationBar">false</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#071226" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#00E08C" android:pathData="M54,14a40,40 0,1 0,0.1,0M54,26a28,28 0,1 1,0,56a28,28 0,0 1,0,-56"/>
              <path android:fillColor="#00AEFF" android:pathData="M54,30l22,14v24l-22,14l-22,-14v-24z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M42,47h24v7h-24z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M42,59h24v7h-24z"/>
          </vector>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'EOF'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/icon_bg"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:label="UnityForge"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/unityforge/mobile/MainActivity.java <<'EOF'
          package com.unityforge.mobile;

          import android.app.Activity;
          import android.os.Bundle;
          import android.graphics.Color;
          import android.content.*;
          import android.net.Uri;
          import android.text.InputType;
          import android.util.Base64;
          import android.view.Gravity;
          import android.widget.*;
          import org.json.*;
          import java.io.*;
          import java.net.*;

          public class MainActivity extends Activity {
              LinearLayout root;
              SharedPreferences prefs;
              TextView status;
              EditText tokenBox, ownerBox, repoBox, workflowBox, gameNameBox, packageBox, characterBox, worldBox, notesBox;

              int bg = Color.rgb(10,12,18);
              int card = Color.rgb(24,28,38);
              int text = Color.WHITE;
              int accent = Color.rgb(0,220,140);

              @Override public void onCreate(Bundle b) {
                  super.onCreate(b);
                  prefs = getSharedPreferences("uf", MODE_PRIVATE);
                  getWindow().setStatusBarColor(bg);
                  getWindow().setNavigationBarColor(bg);
                  home();
              }

              void base() {
                  ScrollView s = new ScrollView(this);
                  s.setBackgroundColor(bg);
                  root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(36,120,36,150);
                  root.setBackgroundColor(bg);
                  s.addView(root);
                  setContentView(s);
              }

              TextView label(String t, int size) {
                  TextView v = new TextView(this);
                  v.setText(t);
                  v.setTextSize(size);
                  v.setTextColor(text);
                  v.setGravity(Gravity.CENTER);
                  v.setPadding(0,12,0,12);
                  return v;
              }

              EditText input(String hint, String val) {
                  EditText e = new EditText(this);
                  e.setHint(hint);
                  e.setText(val);
                  e.setTextColor(text);
                  e.setHintTextColor(Color.GRAY);
                  e.setBackgroundColor(card);
                  e.setPadding(20,20,20,20);
                  e.setSingleLine(false);
                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(-1,-2);
                  p.setMargins(0,14,0,0);
                  e.setLayoutParams(p);
                  return e;
              }

              Button btn(String t) {
                  Button b = new Button(this);
                  b.setText(t);
                  b.setTextSize(17);
                  b.setTextColor(Color.WHITE);
                  b.setAllCaps(false);
                  b.setBackgroundColor(accent);
                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(-1,-2);
                  p.setMargins(0,18,0,0);
                  b.setLayoutParams(p);
                  return b;
              }

              void home() {
                  base();
                  root.addView(label("UnityForge",34));
                  root.addView(label("Mobile Unity Template Control Panel",15));

                  tokenBox = input("GitHub token - paste only inside app", prefs.getString("token",""));
                  tokenBox.setInputType(InputType.TYPE_CLASS_TEXT | InputType.TYPE_TEXT_VARIATION_PASSWORD);

                  ownerBox = input("GitHub username", prefs.getString("owner","rhoadsnate-gif"));
                  repoBox = input("Unity game repo name", prefs.getString("repo",""));
                  workflowBox = input("Unity build workflow file", prefs.getString("workflow","unity-build.yml"));

                  gameNameBox = input("Game name", prefs.getString("game","My RPG Game"));
                  packageBox = input("Package name", prefs.getString("pkg","com.orbitpulse.rpg"));
                  characterBox = input("Character style", prefs.getString("character","male warrior"));
                  worldBox = input("World style", prefs.getString("world","viking fantasy village"));
                  notesBox = input("Extra changes", prefs.getString("notes","Add mobile joystick, attack button, OrbitPulse branding, Android safe area."));

                  Button save = btn("Save");
                  Button check = btn("Load / Check Unity Template");
                  Button config = btn("Create Game Config");
                  Button build = btn("Build APK");
                  Button repo = btn("Open GitHub Repo");
                  Button actions = btn("Open APK Builds");
                  Button upload = btn("Upload Files Page");
                  Button help = btn("Instructions");

                  status = label("Ready",14);

                  root.addView(save);
                  root.addView(check);
                  root.addView(config);
                  root.addView(build);
                  root.addView(repo);
                  root.addView(actions);
                  root.addView(upload);
                  root.addView(help);
                  root.addView(status);

                  save.setOnClickListener(v -> save());
                  check.setOnClickListener(v -> checkUnityProject());
                  config.setOnClickListener(v -> updateConfig());
                  build.setOnClickListener(v -> triggerBuild());
                  repo.setOnClickListener(v -> open("https://github.com/"+owner()+"/"+repo()));
                  actions.setOnClickListener(v -> open("https://github.com/"+owner()+"/"+repo()+"/actions"));
                  upload.setOnClickListener(v -> open("https://github.com/"+owner()+"/"+repo()+"/upload/main"));
                  help.setOnClickListener(v -> help());
              }

              void help() {
                  base();
                  root.addView(label("How It Works",30));
                  root.addView(label("1. Upload Unity project to GitHub\n2. Open UnityForge\n3. Enter repo name\n4. Tap Load / Check\n5. Tap Create Game Config\n6. Tap Build APK",16));
                  root.addView(label("A real Unity project must include:\nAssets/\nPackages/\nProjectSettings/",15));
                  root.addView(label("This app edits files and starts builds. It does not replace the full Unity Editor.",14));
                  Button back = btn("Back");
                  root.addView(back);
                  back.setOnClickListener(v -> home());
              }

              void save() {
                  prefs.edit()
                      .putString("token", tokenBox.getText().toString().trim())
                      .putString("owner", ownerBox.getText().toString().trim())
                      .putString("repo", repoBox.getText().toString().trim())
                      .putString("workflow", workflowBox.getText().toString().trim())
                      .putString("game", gameNameBox.getText().toString().trim())
                      .putString("pkg", packageBox.getText().toString().trim())
                      .putString("character", characterBox.getText().toString().trim())
                      .putString("world", worldBox.getText().toString().trim())
                      .putString("notes", notesBox.getText().toString().trim())
                      .apply();
                  toast("Saved");
              }

              String token(){return tokenBox.getText().toString().trim();}
              String owner(){return ownerBox.getText().toString().trim();}
              String repo(){return repoBox.getText().toString().trim();}
              String workflow(){return workflowBox.getText().toString().trim();}

              void checkUnityProject() {
                  save();
                  setStatus("Checking Unity project...");
                  new Thread(() -> {
                      try {
                          boolean assets = exists("Assets");
                          boolean packages = exists("Packages");
                          boolean settings = exists("ProjectSettings");
                          if (assets && packages && settings) ok("Unity template loaded: Assets, Packages, ProjectSettings found.");
                          else fail("Missing Unity folders. Need Assets, Packages, ProjectSettings.");
                      } catch(Exception e){ fail(e.getMessage()); }
                  }).start();
              }

              boolean exists(String path) throws Exception {
                  String url = "https://api.github.com/repos/"+owner()+"/"+repo()+"/contents/"+path;
                  HttpURLConnection c = conn(url,"GET");
                  return c.getResponseCode()==200;
              }

              JSONObject configJson() throws Exception {
                  JSONObject j = new JSONObject();
                  j.put("gameName", gameNameBox.getText().toString().trim());
                  j.put("packageName", packageBox.getText().toString().trim());
                  j.put("character", characterBox.getText().toString().trim());
                  j.put("world", worldBox.getText().toString().trim());
                  j.put("notes", notesBox.getText().toString().trim());
                  j.put("mobileJoystick", true);
                  j.put("attackButton", true);
                  j.put("androidSafeArea", true);
                  j.put("orbitpulseBranding", true);
                  return j;
              }

              void updateConfig() {
                  save();
                  setStatus("Creating .orbitforge/config.json...");
                  new Thread(() -> {
                      try {
                          String path = ".orbitforge/config.json";
                          String api = "https://api.github.com/repos/"+owner()+"/"+repo()+"/contents/.orbitforge%2Fconfig.json";
                          String sha = null;

                          HttpURLConnection get = conn(api,"GET");
                          if (get.getResponseCode()==200) {
                              JSONObject old = new JSONObject(read(get.getInputStream()));
                              sha = old.optString("sha",null);
                          }

                          JSONObject body = new JSONObject();
                          body.put("message","Update UnityForge config");
                          body.put("content", Base64.encodeToString(configJson().toString(2).getBytes("UTF-8"), Base64.NO_WRAP));
                          if (sha != null) body.put("sha", sha);

                          HttpURLConnection put = conn(api,"PUT");
                          write(put, body.toString());

                          int code = put.getResponseCode();
                          if (code==200 || code==201) ok("Game config saved to GitHub.");
                          else fail("Config error "+code+": "+readError(put));
                      } catch(Exception e){ fail(e.getMessage()); }
                  }).start();
              }

              void triggerBuild() {
                  save();
                  setStatus("Starting APK build...");
                  new Thread(() -> {
                      try {
                          String url = "https://api.github.com/repos/"+owner()+"/"+repo()+"/actions/workflows/"+workflow()+"/dispatches";
                          JSONObject body = new JSONObject();
                          body.put("ref","main");
                          HttpURLConnection post = conn(url,"POST");
                          write(post, body.toString());
                          int code = post.getResponseCode();
                          if (code==204) ok("Build started. Open APK Builds.");
                          else fail("Build start error "+code+": "+readError(post));
                      } catch(Exception e){ fail(e.getMessage()); }
                  }).start();
              }

              HttpURLConnection conn(String u, String m) throws Exception {
                  URL url = new URL(u);
                  HttpURLConnection c = (HttpURLConnection)url.openConnection();
                  c.setRequestMethod(m);
                  c.setRequestProperty("Accept","application/vnd.github+json");
                  c.setRequestProperty("Authorization","Bearer "+token());
                  c.setRequestProperty("X-GitHub-Api-Version","2022-11-28");
                  if (m.equals("POST") || m.equals("PUT")) {
                      c.setDoOutput(true);
                      c.setRequestProperty("Content-Type","application/json");
                  }
                  return c;
              }

              void write(HttpURLConnection c, String d) throws Exception {
                  OutputStream os = c.getOutputStream();
                  os.write(d.getBytes("UTF-8"));
                  os.close();
              }

              String read(InputStream is) throws Exception {
                  BufferedReader br = new BufferedReader(new InputStreamReader(is));
                  StringBuilder sb = new StringBuilder();
                  String line;
                  while((line=br.readLine())!=null) sb.append(line).append("\n");
                  return sb.toString();
              }

              String readError(HttpURLConnection c) {
                  try { return read(c.getErrorStream()); } catch(Exception e){ return ""; }
              }

              void setStatus(String s){ runOnUiThread(() -> status.setText(s)); }
              void ok(String s){ runOnUiThread(() -> { status.setText(s); toast(s); }); }
              void fail(String s){ runOnUiThread(() -> { status.setText("Error: "+s); toast("Error"); }); }
              void toast(String s){ Toast.makeText(this,s,Toast.LENGTH_LONG).show(); }
              void open(String url){ startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url))); }
              @Override public void onBackPressed(){ home(); }
          }
          EOF

      - name: Install Gradle
        run: |
          curl -s https://get.sdkman.io | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install gradle 8.10.2

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: unityforge-mobile-apk
          path: app/build/outputs/apk/debug/*.apk
