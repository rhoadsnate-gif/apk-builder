name: Build OrbitPulse APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create OrbitPulse App
        run: |
          mkdir -p app/src/main/java/com/orbitpulse/app
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "OrbitPulse"
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.orbitpulse.app'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.orbitpulse.app'
                  minSdk 23
                  targetSdk 35
                  versionCode 4
                  versionName '1.3'
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>

              <application android:label="OrbitPulse Builder" android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowLightNavigationBar">false</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/java/com/orbitpulse/app/MainActivity.java <<'EOF'
          package com.orbitpulse.app;

          import android.app.Activity;
          import android.os.Bundle;
          import android.graphics.Color;
          import android.content.SharedPreferences;
          import android.view.Gravity;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.*;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              LinearLayout root;
              SharedPreferences prefs;
              int bg, text, accent;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  Window w = getWindow();
                  w.clearFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  w.setStatusBarColor(Color.rgb(18, 18, 22));
                  w.setNavigationBarColor(Color.rgb(18, 18, 22));

                  prefs = getSharedPreferences("settings", MODE_PRIVATE);
                  applyTheme();
                  showHome();
              }

              void applyTheme() {
                  String theme = prefs.getString("theme", "dark");

                  if (theme.equals("blue")) {
                      bg = Color.rgb(8, 18, 38);
                      text = Color.WHITE;
                      accent = Color.rgb(0, 174, 255);
                  } else if (theme.equals("light")) {
                      bg = Color.rgb(245, 245, 245);
                      text = Color.rgb(20, 20, 20);
                      accent = Color.rgb(50, 100, 255);
                  } else {
                      bg = Color.rgb(12, 12, 15);
                      text = Color.WHITE;
                      accent = Color.rgb(0, 220, 140);
                  }

                  getWindow().setStatusBarColor(bg);
                  getWindow().setNavigationBarColor(bg);
              }

              void baseLayout() {
                  ScrollView scroll = new ScrollView(this);
                  scroll.setBackgroundColor(bg);

                  root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setBackgroundColor(bg);

                  root.setPadding(40, 90, 40, 120);

                  scroll.addView(root);
                  setContentView(scroll);
              }

              TextView label(String t, int size) {
                  TextView v = new TextView(this);
                  v.setText(t);
                  v.setTextSize(size);
                  v.setTextColor(text);
                  v.setGravity(Gravity.CENTER);
                  v.setPadding(0, 18, 0, 18);
                  return v;
              }

              Button button(String t) {
                  Button b = new Button(this);
                  b.setText(t);
                  b.setTextSize(18);
                  b.setTextColor(Color.WHITE);
                  b.setBackgroundColor(accent);
                  b.setAllCaps(false);

                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT,
                      LinearLayout.LayoutParams.WRAP_CONTENT
                  );
                  p.setMargins(0, 22, 0, 0);
                  b.setLayoutParams(p);
                  return b;
              }

              void showHome() {
                  applyTheme();
                  baseLayout();

                  root.addView(label("OrbitPulse", 34));
                  root.addView(label("APK Builder", 18));

                  Button build = button("Build APK");
                  Button apps = button("My Apps");
                  Button settings = button("Settings & Themes");

                  root.addView(build);
                  root.addView(apps);
                  root.addView(settings);

                  build.setOnClickListener(v -> openWeb("https://github.com/rhoadsnate-gif/apk-builder/actions"));
                  apps.setOnClickListener(v -> openWeb("https://github.com/rhoadsnate-gif?tab=repositories"));
                  settings.setOnClickListener(v -> showSettings());
              }

              void showSettings() {
                  applyTheme();
                  baseLayout();

                  root.addView(label("Settings", 30));
                  root.addView(label("OrbitPulse.Studio", 18));

                  Button dark = button("Dark Theme");
                  Button blue = button("Blue Theme");
                  Button light = button("Light Theme");
                  Button back = button("Back");

                  root.addView(dark);
                  root.addView(blue);
                  root.addView(light);
                  root.addView(back);

                  dark.setOnClickListener(v -> saveTheme("dark"));
                  blue.setOnClickListener(v -> saveTheme("blue"));
                  light.setOnClickListener(v -> saveTheme("light"));
                  back.setOnClickListener(v -> showHome());
              }

              void saveTheme(String theme) {
                  prefs.edit().putString("theme", theme).apply();
                  Toast.makeText(this, "Theme saved", Toast.LENGTH_SHORT).show();
                  showSettings();
              }

              void openWeb(String url) {
                  applyTheme();

                  LinearLayout holder = new LinearLayout(this);
                  holder.setOrientation(LinearLayout.VERTICAL);
                  holder.setBackgroundColor(bg);

                  TextView spacerTop = new TextView(this);
                  spacerTop.setHeight(90);
                  spacerTop.setBackgroundColor(bg);

                  WebView web = new WebView(this);
                  web.setBackgroundColor(Color.WHITE);
                  web.getSettings().setJavaScriptEnabled(true);
                  web.getSettings().setDomStorageEnabled(true);
                  web.setWebViewClient(new WebViewClient());
                  web.loadUrl(url);

                  TextView spacerBottom = new TextView(this);
                  spacerBottom.setHeight(90);
                  spacerBottom.setBackgroundColor(bg);

                  holder.addView(spacerTop);
                  holder.addView(web, new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT, 0, 1
                  ));
                  holder.addView(spacerBottom);

                  setContentView(holder);
              }

              @Override
              public void onBackPressed() {
                  showHome();
              }
          }
          EOF

      - name: Install Gradle
        run: |
          curl -s https://get.sdkman.io | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install gradle 8.10.2

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: orbitpulse-apk
          path: app/build/outputs/apk/debug/*.apk
