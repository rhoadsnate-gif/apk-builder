name: Build UnityForge RPG Studio APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create UnityForge RPG Studio
        run: |
          mkdir -p app/src/main/java/com/unityforge/rpgstudio
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          cat > settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "UnityForgeRPGStudio"
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins { id 'com.android.application' version '8.7.3' apply false }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.unityforge.rpgstudio'
              compileSdk 35
              defaultConfig {
                  applicationId 'com.unityforge.rpgstudio'
                  minSdk 26
                  targetSdk 35
                  versionCode 3
                  versionName '1.2'
              }
          }
          EOF

          cat > app/src/main/res/values/colors.xml <<'EOF'
          <resources><color name="icon_bg">#071226</color></resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowLightNavigationBar">false</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#071226" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#00E08C" android:pathData="M54,13a41,41 0,1 0,0.1,0M54,26a28,28 0,1 1,0,56a28,28 0,0 1,0,-56"/>
              <path android:fillColor="#00AEFF" android:pathData="M54,30l24,15v26l-24,15l-24,-15v-26z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M40,46h28v8h-28z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M40,59h28v8h-28z"/>
          </vector>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'EOF'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/icon_bg"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <queries>
                  <package android:name="com.shadow.tech"/>
                  <package android:name="com.blade.shadow.cloudgaming"/>
                  <package android:name="com.blade.shadow"/>
              </queries>

              <application
                  android:label="UnityForge RPG"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/unityforge/rpgstudio/MainActivity.java <<'EOF'
          package com.unityforge.rpgstudio;

          import android.app.Activity;
          import android.os.Bundle;
          import android.content.*;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.net.Uri;
          import android.view.Gravity;
          import android.widget.*;

          public class MainActivity extends Activity {
              LinearLayout root;
              SharedPreferences prefs;

              int bg = Color.rgb(10,12,18);
              int card = Color.rgb(24,28,38);
              int text = Color.WHITE;
              int accent = Color.rgb(0,220,140);

              String[] shadowPackages = {
                  "com.shadow.tech",
                  "com.blade.shadow.cloudgaming",
                  "com.blade.shadow"
              };

              EditText repoBox, unityBox, rpgKitBox, worldPackBox, notesBox, gameNameBox, packageBox;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  prefs = getSharedPreferences("studio", MODE_PRIVATE);
                  getWindow().setStatusBarColor(bg);
                  getWindow().setNavigationBarColor(bg);
                  showHome();
              }

              void base() {
                  ScrollView scroll = new ScrollView(this);
                  scroll.setBackgroundColor(bg);
                  root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(36,120,36,150);
                  root.setBackgroundColor(bg);
                  scroll.addView(root);
                  setContentView(scroll);
              }

              TextView label(String t, int size) {
                  TextView v = new TextView(this);
                  v.setText(t);
                  v.setTextSize(size);
                  v.setTextColor(text);
                  v.setGravity(Gravity.CENTER);
                  v.setPadding(0,12,0,12);
                  return v;
              }

              TextView box(String t) {
                  TextView v = label(t,15);
                  v.setGravity(Gravity.LEFT);
                  v.setBackgroundColor(card);
                  v.setPadding(24,24,24,24);
                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(-1,-2);
                  p.setMargins(0,16,0,0);
                  v.setLayoutParams(p);
                  return v;
              }

              EditText input(String hint, String val) {
                  EditText e = new EditText(this);
                  e.setHint(hint);
                  e.setText(val);
                  e.setTextColor(text);
                  e.setHintTextColor(Color.GRAY);
                  e.setBackgroundColor(card);
                  e.setPadding(20,20,20,20);
                  e.setSingleLine(false);
                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(-1,-2);
                  p.setMargins(0,14,0,0);
                  e.setLayoutParams(p);
                  return e;
              }

              Button btn(String t) {
                  Button b = new Button(this);
                  b.setText(t);
                  b.setTextSize(17);
                  b.setTextColor(Color.WHITE);
                  b.setAllCaps(false);
                  b.setBackgroundColor(accent);
                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(-1,-2);
                  p.setMargins(0,18,0,0);
                  b.setLayoutParams(p);
                  return b;
              }

              void showHome() {
                  base();
                  String installedShadow = getInstalledShadowPackage();

                  root.addView(label("UnityForge RPG",34));
                  root.addView(label("Phone command center for 3D RPG games",15));

                  if (installedShadow != null) {
                      root.addView(box("✅ Shadow PC detected.\nPackage found:\n" + installedShadow + "\n\nYou can run Unity from your phone using Shadow."));
                  } else {
                      root.addView(box("❌ Shadow PC not detected.\nInstall Shadow PC first so Unity can run on a cloud Windows PC."));
                  }

                  Button shadow = btn("Open / Install Shadow PC");
                  Button project = btn("Project Setup");
                  Button steps = btn("Baby Steps");
                  Button links = btn("Open Tools");
                  Button build = btn("Build Tracker");
                  Button checklist = btn("RPG Checklist");

                  root.addView(shadow);
                  root.addView(project);
                  root.addView(steps);
                  root.addView(links);
                  root.addView(build);
                  root.addView(checklist);

                  shadow.setOnClickListener(v -> openShadow());
                  project.setOnClickListener(v -> showProjectSetup());
                  steps.setOnClickListener(v -> showSteps());
                  links.setOnClickListener(v -> showTools());
                  build.setOnClickListener(v -> showBuildTracker());
                  checklist.setOnClickListener(v -> showChecklist());
              }

              void showProjectSetup() {
                  base();
                  root.addView(label("Project Setup",32));

                  gameNameBox = input("Game name", prefs.getString("gameName","Viking Shadow RPG"));
                  packageBox = input("Package name", prefs.getString("package","com.orbitpulse.vikingrpg"));
                  repoBox = input("GitHub repo link", prefs.getString("repo","https://github.com/rhoadsnate-gif/viking-rpg-game"));
                  unityBox = input("Unity version", prefs.getString("unity","2022.3 LTS"));
                  rpgKitBox = input("RPG kit link", prefs.getString("rpgKit","Paste your $70 RPG kit link here"));
                  worldPackBox = input("World pack link", prefs.getString("worldPack","Paste your $80 Viking world pack link here"));
                  notesBox = input("Game notes", prefs.getString("notes","Remove girl character. Add male Viking warrior. Add joystick, attack, health, inventory, quests."));

                  Button save = btn("Save Project");
                  Button openRepo = btn("Open GitHub Repo");
                  Button back = btn("Back");

                  root.addView(save);
                  root.addView(openRepo);
                  root.addView(back);

                  save.setOnClickListener(v -> saveProject());
                  openRepo.setOnClickListener(v -> open(repoBox.getText().toString().trim()));
                  back.setOnClickListener(v -> showHome());
              }

              void saveProject() {
                  prefs.edit()
                      .putString("gameName", gameNameBox.getText().toString())
                      .putString("package", packageBox.getText().toString())
                      .putString("repo", repoBox.getText().toString())
                      .putString("unity", unityBox.getText().toString())
                      .putString("rpgKit", rpgKitBox.getText().toString())
                      .putString("worldPack", worldPackBox.getText().toString())
                      .putString("notes", notesBox.getText().toString())
                      .apply();
                  toast("Project saved");
              }

              void showSteps() {
                  base();
                  root.addView(label("Baby Steps",32));

                  root.addView(box("1. Tap Open / Install Shadow PC.\n\nShadow PC gives your phone a real Windows computer."));
                  root.addView(box("2. Inside Shadow PC, install Unity Hub.\n\nGo to unity.com/download."));
                  root.addView(box("3. Install Unity Editor.\n\nUse the version required by your RPG kit."));
                  root.addView(box("4. Buy/download your RPG kit in Unity Asset Store.\n\nImport it into a Unity project."));
                  root.addView(box("5. Buy/download your Viking world pack.\n\nImport it after the RPG kit."));
                  root.addView(box("6. Press Play in Unity.\n\nMake sure the template works before changing anything."));
                  root.addView(box("7. Replace the girl character.\n\nUse a male warrior / Viking character."));
                  root.addView(box("8. Add Android mobile controls.\n\nJoystick, attack button, jump button, camera drag."));
                  root.addView(box("9. Save project to GitHub.\n\nUse your repo from Project Setup."));
                  root.addView(box("10. Build APK.\n\nUse Unity Android Build Settings or GitHub Actions."));
                  root.addView(box("11. Download APK to your phone.\n\nInstall and test."));
                  root.addView(box("12. Fix, rebuild, test again.\n\nThis is how real games get made."));

                  Button shadow = btn("Open Shadow PC");
                  Button back = btn("Back");
                  root.addView(shadow);
                  root.addView(back);
                  shadow.setOnClickListener(v -> openShadow());
                  back.setOnClickListener(v -> showHome());
              }

              void showTools() {
                  base();
                  root.addView(label("Open Tools",32));

                  Button shadow = btn("Shadow PC");
                  Button unity = btn("Unity Download");
                  Button asset = btn("Unity Asset Store");
                  Button github = btn("My GitHub");
                  Button repo = btn("Saved Game Repo");
                  Button builds = btn("APK Builds");
                  Button back = btn("Back");

                  root.addView(shadow);
                  root.addView(unity);
                  root.addView(asset);
                  root.addView(github);
                  root.addView(repo);
                  root.addView(builds);
                  root.addView(back);

                  shadow.setOnClickListener(v -> openShadow());
                  unity.setOnClickListener(v -> open("https://unity.com/download"));
                  asset.setOnClickListener(v -> open("https://assetstore.unity.com"));
                  github.setOnClickListener(v -> open("https://github.com/rhoadsnate-gif"));
                  repo.setOnClickListener(v -> open(prefs.getString("repo","https://github.com/rhoadsnate-gif")));
                  builds.setOnClickListener(v -> open(prefs.getString("repo","https://github.com/rhoadsnate-gif") + "/actions"));
                  back.setOnClickListener(v -> showHome());
              }

              void showBuildTracker() {
                  base();
                  root.addView(label("Build Tracker",32));

                  root.addView(box(
                      "Saved Game:\n" + prefs.getString("gameName","Viking Shadow RPG") +
                      "\n\nPackage:\n" + prefs.getString("package","com.orbitpulse.vikingrpg") +
                      "\n\nUnity:\n" + prefs.getString("unity","2022.3 LTS") +
                      "\n\nRepo:\n" + prefs.getString("repo","No repo saved")
                  ));

                  root.addView(box(
                      "Build order:\n\n" +
                      "☐ Shadow PC works\n" +
                      "☐ Unity Hub installed\n" +
                      "☐ RPG kit imported\n" +
                      "☐ Viking pack imported\n" +
                      "☐ Girl character removed\n" +
                      "☐ Mobile controls added\n" +
                      "☐ Android build settings done\n" +
                      "☐ Project saved to GitHub\n" +
                      "☐ APK built\n" +
                      "☐ APK tested on phone"
                  ));

                  root.addView(box(
                      "Notes:\n" + prefs.getString("notes","No notes saved")
                  ));

                  Button openBuilds = btn("Open APK Builds");
                  Button openRepo = btn("Open Repo");
                  Button back = btn("Back");

                  root.addView(openBuilds);
                  root.addView(openRepo);
                  root.addView(back);

                  openBuilds.setOnClickListener(v -> open(prefs.getString("repo","https://github.com/rhoadsnate-gif") + "/actions"));
                  openRepo.setOnClickListener(v -> open(prefs.getString("repo","https://github.com/rhoadsnate-gif")));
                  back.setOnClickListener(v -> showHome());
              }

              void showChecklist() {
                  base();
                  root.addView(label("RPG Checklist",32));

                  root.addView(box(
                      "Required:\n\n" +
                      "✅ Shadow PC\n" +
                      "✅ Unity Hub\n" +
                      "✅ Unity Editor\n" +
                      "✅ RPG template\n" +
                      "✅ 3D world pack\n" +
                      "✅ GitHub repo\n" +
                      "✅ Android build support"
                  ));

                  root.addView(box(
                      "Game features:\n\n" +
                      "☐ Male player character\n" +
                      "☐ Third-person camera\n" +
                      "☐ Movement\n" +
                      "☐ Attack\n" +
                      "☐ Enemies\n" +
                      "☐ Health bar\n" +
                      "☐ Inventory\n" +
                      "☐ Quests\n" +
                      "☐ Coins/rewards\n" +
                      "☐ Pause menu\n" +
                      "☐ Settings menu"
                  ));

                  root.addView(box(
                      "Android features:\n\n" +
                      "☐ Joystick\n" +
                      "☐ Attack button\n" +
                      "☐ Jump button\n" +
                      "☐ Camera drag\n" +
                      "☐ Safe area for Samsung status bar\n" +
                      "☐ App icon\n" +
                      "☐ App name\n" +
                      "☐ APK test"
                  ));

                  Button back = btn("Back");
                  root.addView(back);
                  back.setOnClickListener(v -> showHome());
              }

              String getInstalledShadowPackage() {
                  for (String p : shadowPackages) {
                      if (isInstalled(p)) return p;
                  }
                  return null;
              }

              boolean isInstalled(String packageName) {
                  try {
                      getPackageManager().getPackageInfo(packageName, 0);
                      return true;
                  } catch (PackageManager.NameNotFoundException e) {
                      return false;
                  }
              }

              void openShadow() {
                  String installed = getInstalledShadowPackage();

                  if (installed != null) {
                      Intent launch = getPackageManager().getLaunchIntentForPackage(installed);
                      if (launch != null) {
                          startActivity(launch);
                      } else {
                          open("https://shadow.tech/download");
                      }
                  } else {
                      open("https://play.google.com/store/search?q=Shadow%20PC&c=apps");
                  }
              }

              void open(String url) {
                  if (url == null || url.trim().length() == 0) {
                      toast("No link saved");
                      return;
                  }
                  startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url)));
              }

              void toast(String s) {
                  Toast.makeText(this,s,Toast.LENGTH_LONG).show();
              }

              @Override
              public void onBackPressed() {
                  showHome();
              }
          }
          EOF

      - name: Install Gradle
        run: |
          curl -s https://get.sdkman.io | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install gradle 8.10.2

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: unityforge-rpg-studio-apk
          path: app/build/outputs/apk/debug/*.apk
