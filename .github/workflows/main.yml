name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2

      - name: Export Android
        run: |
          godot --headless --export-release "Android" build.apk

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: orderfill-apk
          path: build.apk
