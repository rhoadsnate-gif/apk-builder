name: Build OrbitForge APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create OrbitForge App
        run: |
          mkdir -p app/src/main/java/com/orbitforge/app
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "OrbitForge"
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.orbitforge.app'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.orbitforge.app'
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowLightNavigationBar">false</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/values/colors.xml <<'EOF'
          <resources>
              <color name="icon_bg">#081226</color>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">

              <path android:fillColor="#081226" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#00E08C" android:pathData="M54,16a38,38 0,1 0,0.1,0M54,27a27,27 0,1 1,0,54a27,27 0,0 1,0,-54"/>
              <path android:fillColor="#00AEFF" android:pathData="M54,34l16,10v20l-16,10l-16,-10v-20z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M49,44h10v10h-10z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M38,66h8v12h-8z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M62,66h8v12h-8z"/>
          </vector>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'EOF'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/icon_bg"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>

              <application
                  android:label="OrbitForge"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:theme="@style/AppTheme">

                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/orbitforge/app/MainActivity.java <<'EOF'
          package com.orbitforge.app;

          import android.app.Activity;
          import android.os.Bundle;
          import android.graphics.Color;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.net.Uri;
          import android.view.Gravity;
          import android.widget.*;

          public class MainActivity extends Activity {
              LinearLayout root;
              SharedPreferences prefs;
              int bg, text, accent;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  prefs = getSharedPreferences("settings", MODE_PRIVATE);
                  applyTheme();
                  showHome();
              }

              void applyTheme() {
                  String theme = prefs.getString("theme", "dark");

                  if (theme.equals("blue")) {
                      bg = Color.rgb(8, 18, 38);
                      text = Color.WHITE;
                      accent = Color.rgb(0, 174, 255);
                  } else if (theme.equals("light")) {
                      bg = Color.rgb(245, 245, 245);
                      text = Color.rgb(20, 20, 20);
                      accent = Color.rgb(50, 100, 255);
                  } else {
                      bg = Color.rgb(12, 12, 15);
                      text = Color.WHITE;
                      accent = Color.rgb(0, 220, 140);
                  }

                  getWindow().setStatusBarColor(bg);
                  getWindow().setNavigationBarColor(bg);
              }

              void baseLayout() {
                  ScrollView scroll = new ScrollView(this);
                  scroll.setBackgroundColor(bg);

                  root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setBackgroundColor(bg);
                  root.setPadding(40, 130, 40, 150);

                  scroll.addView(root);
                  setContentView(scroll);
              }

              TextView label(String t, int size) {
                  TextView v = new TextView(this);
                  v.setText(t);
                  v.setTextSize(size);
                  v.setTextColor(text);
                  v.setGravity(Gravity.CENTER);
                  v.setPadding(0, 18, 0, 18);
                  return v;
              }

              Button button(String t) {
                  Button b = new Button(this);
                  b.setText(t);
                  b.setTextSize(18);
                  b.setTextColor(Color.WHITE);
                  b.setBackgroundColor(accent);
                  b.setAllCaps(false);

                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT,
                      LinearLayout.LayoutParams.WRAP_CONTENT
                  );
                  p.setMargins(0, 22, 0, 0);
                  b.setLayoutParams(p);
                  return b;
              }

              void showHome() {
                  applyTheme();
                  baseLayout();

                  root.addView(label("OrbitForge", 34));
                  root.addView(label("APK Builder by OrbitPulse.Studio", 16));
                  root.addView(label("Simple. Safe. GitHub powered.", 14));

                  Button build = button("Build APK");
                  Button apps = button("My Apps");
                  Button github = button("Open GitHub");
                  Button settings = button("Settings & Themes");

                  root.addView(build);
                  root.addView(apps);
                  root.addView(github);
                  root.addView(settings);

                  build.setOnClickListener(v -> openBrowser("https://github.com/rhoadsnate-gif/apk-builder/actions"));
                  apps.setOnClickListener(v -> openBrowser("https://github.com/rhoadsnate-gif?tab=repositories"));
                  github.setOnClickListener(v -> openBrowser("https://github.com"));
                  settings.setOnClickListener(v -> showSettings());
              }

              void showSettings() {
                  applyTheme();
                  baseLayout();

                  root.addView(label("Settings", 30));
                  root.addView(label("OrbitPulse.Studio", 18));

                  Button dark = button("Dark Theme");
                  Button blue = button("Blue Theme");
                  Button light = button("Light Theme");
                  Button back = button("Back");

                  root.addView(dark);
                  root.addView(blue);
                  root.addView(light);
                  root.addView(back);

                  dark.setOnClickListener(v -> saveTheme("dark"));
                  blue.setOnClickListener(v -> saveTheme("blue"));
                  light.setOnClickListener(v -> saveTheme("light"));
                  back.setOnClickListener(v -> showHome());
              }

              void saveTheme(String theme) {
                  prefs.edit().putString("theme", theme).apply();
                  Toast.makeText(this, "Theme saved", Toast.LENGTH_SHORT).show();
                  showSettings();
              }

              void openBrowser(String url) {
                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                  startActivity(intent);
              }

              @Override
              public void onBackPressed() {
                  showHome();
              }
          }
          EOF

      - name: Install Gradle
        run: |
          curl -s https://get.sdkman.io | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install gradle 8.10.2

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: orbitforge-apk
          path: app/build/outputs/apk/debug/*.apk
