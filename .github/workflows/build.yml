name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.2.2
          use-dotnet: false

      - name: Install Android export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip Godot_v4.2.2-stable_export_templates.tpz
          cp templates/android_debug.apk ~/.local/share/godot/export_templates/4.2.2.stable/android_debug.apk
          cp templates/android_release.apk ~/.local/share/godot/export_templates/4.2.2.stable/android_release.apk

      - name: Create debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create Android export preset
        run: |
          cat > export_presets.cfg <<'EOF'
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/orderfill-trainer.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false
          script_export_mode=1

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/export_format=0
          gradle_build/min_sdk=""
          gradle_build/target_sdk=""
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          keystore/debug="debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          package/unique_name="com.orderfill.trainer"
          package/name="OrderFill Trainer"
          package/signed=true
          package/app_category=2
          permissions/internet=false
          EOF

      - name: Make build folder
        run: mkdir -p build

      - name: Build Android APK
        run: godot --headless --export-debug "Android" build/orderfill-trainer.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: orderfill-trainer-apk
          path: build/orderfill-trainer.apk
